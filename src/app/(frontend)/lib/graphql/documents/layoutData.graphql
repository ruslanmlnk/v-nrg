query GetLayoutData {
  meUser {
    user {
      id
      email
      firstName
      lastName
      phone
      role
    }
  }
  Products(limit: 100, sort: "createdAt", where: { price: { greater_than: 0 } }) {
    docs {
      ...ProductFrontendFields
    }
  }
  Categories(limit: 100, sort: "createdAt") {
    docs {
      id
      title
      description
      slug
      image {
        url
      }
    }
  }
}
